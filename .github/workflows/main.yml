name: Auto Resolve Issue

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  resolve-issue:
    if: github.event.label.name == 'claude-fix'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Claude benefits from seeing git history/context

      - name: Run Claude Code
        id: run_claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # We tell Claude to fix the code but NOT create its own PR, 
          # so your existing 'Create Pull Request' step can handle it.
          prompt: "Resolve this issue: ${{ github.event.issue.body }}. Apply the fix to the local files."

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "Claude: Fix #${{ github.event.issue.number }}"
          title: "Claude Fix: ${{ github.event.issue.title }}"
          body: |
            This PR was automatically generated by Anthropic Claude.

            ### Claude Summary:
            ${{ steps.run_claude.outputs.summary }}

            **Closes #${{ github.event.issue.number }}**
          delete-branch: true

      - name: Create bot token
        id: bot_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      # Auto-approve
      - name: Auto-approve PR
        if: steps.cpr.outputs.pull-request-number != ''
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ steps.bot_token.outputs.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}

      # Enable GitHub Auto-merge
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
